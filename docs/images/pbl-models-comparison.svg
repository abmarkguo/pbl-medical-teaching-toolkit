<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <rect width="680" height="480" fill="#1a1a2e"/>
  
  <text x="340" y="30" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="600">
    PBL 三大模型对比图 / PBL Model Comparison
  </text>
  
  <defs>
    <marker id="arr_m1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a8a9a"/>
    </marker>
  </defs>
  
  <!-- Column 1: Maastricht -->
  <rect x="20" y="50" width="200" height="410" rx="8" fill="#16213e" stroke="#4e9af1" stroke-width="1.5"/>
  <text x="120" y="75" text-anchor="middle" fill="#4e9af1" font-size="13" font-weight="600">马斯特里赫特七步法</text>
  <text x="120" y="92" text-anchor="middle" fill="#a0a0b0" font-size="10">Maastricht 7-Step</text>
  
  <rect x="40" y="105" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#4e9af1" stroke-width="1"/>
  <text x="120" y="123" text-anchor="middle" fill="#e0e0e0" font-size="10">Step1 澄清术语</text>
  
  <rect x="40" y="140" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#4e9af1" stroke-width="1"/>
  <text x="120" y="158" text-anchor="middle" fill="#e0e0e0" font-size="10">Step2 定义问题</text>
  
  <rect x="40" y="175" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#5cb85c" stroke-width="1"/>
  <text x="120" y="193" text-anchor="middle" fill="#e0e0e0" font-size="10">Step3 头脑风暴</text>
  
  <rect x="40" y="210" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#5cb85c" stroke-width="1"/>
  <text x="120" y="228" text-anchor="middle" fill="#e0e0e0" font-size="10">Step4 结构化整理</text>
  
  <rect x="40" y="245" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#f0ad4e" stroke-width="1"/>
  <text x="120" y="263" text-anchor="middle" fill="#e0e0e0" font-size="10">Step5 学习目标</text>
  
  <rect x="40" y="280" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#f0ad4e" stroke-width="1"/>
  <text x="120" y="298" text-anchor="middle" fill="#e0e0e0" font-size="10">Step6 自主学习</text>
  
  <rect x="40" y="315" width="160" height="28" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="120" y="333" text-anchor="middle" fill="#e0e0e0" font-size="10">Step7 汇报综合</text>
  
  <text x="120" y="365" text-anchor="middle" fill="#a0a0b0" font-size="9">课时：3次以上</text>
  <text x="120" y="380" text-anchor="middle" fill="#a0a0b0" font-size="9">小组：6-8人</text>
  <text x="120" y="395" text-anchor="middle" fill="#a0a0b0" font-size="9">推理强度：低-中</text>
  <text x="120" y="410" text-anchor="middle" fill="#a0a0b0" font-size="9">适用：本科低年级</text>
  <text x="120" y="435" text-anchor="middle" fill="#4e9af1" font-size="10" font-weight="500">最经典 / 应用最广</text>
  
  <!-- Column 2: Hawaiian -->
  <rect x="240" y="50" width="200" height="410" rx="8" fill="#16213e" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="340" y="75" text-anchor="middle" fill="#5cb85c" font-size="13" font-weight="600">夏威夷 PBL 模型</text>
  <text x="340" y="92" text-anchor="middle" fill="#a0a0b0" font-size="10">Hawaiian PBL Model</text>
  
  <rect x="260" y="105" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#5cb85c" stroke-width="1"/>
  <text x="340" y="123" text-anchor="middle" fill="#e0e0e0" font-size="10">Phase 1</text>
  <text x="340" y="138" text-anchor="middle" fill="#e0e0e0" font-size="10">遭遇与识别</text>
  
  <rect x="260" y="160" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#f0ad4e" stroke-width="1"/>
  <text x="340" y="178" text-anchor="middle" fill="#e0e0e0" font-size="10">Phase 2</text>
  <text x="340" y="193" text-anchor="middle" fill="#e0e0e0" font-size="10">解释与推理</text>
  
  <rect x="260" y="215" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="340" y="233" text-anchor="middle" fill="#e0e0e0" font-size="10">Phase 3</text>
  <text x="340" y="248" text-anchor="middle" fill="#e0e0e0" font-size="10">应用与整合</text>
  
  <rect x="260" y="270" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#d9534f" stroke-width="1"/>
  <text x="340" y="288" text-anchor="middle" fill="#e0e0e0" font-size="10">Phase 4</text>
  <text x="340" y="303" text-anchor="middle" fill="#e0e0e0" font-size="10">评估与反思</text>
  
  <text x="340" y="345" text-anchor="middle" fill="#a0a0b0" font-size="9">课时：2-3次</text>
  <text x="340" y="360" text-anchor="middle" fill="#a0a0b0" font-size="9">小组：6-8人</text>
  <text x="340" y="375" text-anchor="middle" fill="#a0a0b0" font-size="9">推理强度：高</text>
  <text x="340" y="390" text-anchor="middle" fill="#a0a0b0" font-size="9">适用：本科高年级</text>
  <text x="340" y="415" text-anchor="middle" fill="#5cb85c" font-size="10" font-weight="500">临床推理强</text>
  <text x="340" y="435" text-anchor="middle" fill="#5cb85c" font-size="10" font-weight="500">基础-临床桥接优</text>
  
  <!-- Column 3: Chinese -->
  <rect x="460" y="50" width="200" height="410" rx="8" fill="#16213e" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="560" y="75" text-anchor="middle" fill="#f0ad4e" font-size="13" font-weight="600">中国本土化 PBL</text>
  <text x="560" y="92" text-anchor="middle" fill="#a0a0b0" font-size="10">Chinese Localized PBL</text>
  
  <rect x="480" y="105" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#4e9af1" stroke-width="1"/>
  <text x="560" y="123" text-anchor="middle" fill="#e0e0e0" font-size="10">课时1-A</text>
  <text x="560" y="138" text-anchor="middle" fill="#e0e0e0" font-size="10">案例呈现+头脑风暴</text>
  
  <rect x="480" y="155" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#f0ad4e" stroke-width="1"/>
  <text x="560" y="173" text-anchor="middle" fill="#e0e0e0" font-size="10">课时1-B</text>
  <text x="560" y="188" text-anchor="middle" fill="#e0e0e0" font-size="10">知识梳理+学习目标</text>
  
  <rect x="480" y="205" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="560" y="223" text-anchor="middle" fill="#f0ad4e" font-size="10">自主探究期</text>
  <text x="560" y="238" text-anchor="middle" fill="#e0e0e0" font-size="10">2-5天</text>
  
  <rect x="480" y="255" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="560" y="273" text-anchor="middle" fill="#e0e0e0" font-size="10">课时2-D</text>
  <text x="560" y="288" text-anchor="middle" fill="#e0e0e0" font-size="10">小组汇报</text>
  
  <rect x="480" y="305" width="160" height="40" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1"/>
  <text x="560" y="323" text-anchor="middle" fill="#e0e0e0" font-size="10">课时2-E,F</text>
  <text x="560" y="338" text-anchor="middle" fill="#e0e0e0" font-size="10">综合讨论+反思</text>
  
  <text x="560" y="370" text-anchor="middle" fill="#a0a0b0" font-size="9">课时：2次</text>
  <text x="560" y="385" text-anchor="middle" fill="#a0a0b0" font-size="9">小组：8-12人</text>
  <text x="560" y="400" text-anchor="middle" fill="#a0a0b0" font-size="9">推理强度：中</text>
  <text x="560" y="415" text-anchor="middle" fill="#a0a0b0" font-size="9">适用：全年级</text>
  <text x="560" y="440" text-anchor="middle" fill="#f0ad4e" font-size="10" font-weight="500">最适配中国教学</text>
</svg>